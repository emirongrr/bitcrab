[workspace]
resolver = "2"
members = [
    "crates/common",
    "crates/net",
    "crates/node",
    "crates/cli",
]
default-members = ["crates/cli"]

[workspace.package]
version      = "0.1.0"
edition      = "2021"
rust-version = "1.75"
license      = "MIT"

[workspace.dependencies]
# Internal
bitcrab-common = { path = "crates/common" }
bitcrab-net    = { path = "crates/net" }
bitcrab-node   = { path = "crates/node" }

# External — all versions pinned
sha2               = "0.10.8"
ripemd             = "0.1.3"
hex                = "0.4.3"
thiserror          = "1.0.61"
tracing            = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
tokio              = { version = "1.37.0", features = ["rt-multi-thread", "net", "io-util", "sync", "time", "macros"] }
clap               = { version = "4.5.4",  features = ["derive"] }
bytes              = "1.6.0"

[profile.release]
opt-level = 3
lto       = "thin"

[profile.dev]
overflow-checks = true